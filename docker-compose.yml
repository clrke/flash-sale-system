# Full stack, one command:
#
#   docker compose up --build
#
# Then open http://localhost:8080. This runs the backend against the Redis
# adapter (the horizontally scalable, atomic-Lua path) with AOF persistence,
# so the compose stack mirrors the production topology described in
# docs/DEPLOYMENT.md rather than the zero-dependency in-memory default.
#
# To run only Redis for the local dev workflow (npm run dev on the host):
#
#   docker compose up -d redis
#   STORE=redis REDIS_URL=redis://localhost:6379 npm run dev

services:
  redis:
    image: redis:7-alpine
    container_name: flash-sale-redis
    restart: unless-stopped
    # AOF on so the sold set survives a restart, matching the fault-tolerance
    # story in the docs. Host port is exposed for the local dev workflow above.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      STORE: redis
      REDIS_URL: redis://redis:6379
      TOTAL_STOCK: "200"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
